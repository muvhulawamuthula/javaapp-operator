name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & unit test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build, generate CRD/bundle, run unit tests
        run: ./mvnw -B -ntp verify

      - name: Upload generated manifests & OLM bundle
        uses: actions/upload-artifact@v4
        with:
          name: operator-manifests
          path: |
            target/kubernetes/*.yml
            target/bundle/**

  integration:
    name: Integration test (kind)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: javaapp-operator-it

      - name: Run integration tests against kind
        run: ./mvnw -B -ntp verify -DskipITs=false
