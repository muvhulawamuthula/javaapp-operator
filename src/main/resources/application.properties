# ── Kubernetes client ────────────────────────────────────────────────
# Use the real cluster from ~/.kube/config instead of a Quarkus dev service.
quarkus.kubernetes-client.devservices.enabled=false
quarkus.kubernetes-client.trust-certs=true

# ── Operator SDK ─────────────────────────────────────────────────────
# Generate the CRD at build time (target/kubernetes). In dev mode it is also
# applied to the connected cluster automatically; disabled outside dev so we
# never mutate CRDs on a production cluster from the running operator.
quarkus.operator-sdk.crd.generate=true
quarkus.operator-sdk.crd.apply=false
# Validate that the CRD is present on the cluster at startup (fail fast).
quarkus.operator-sdk.crd.validate=true

# ── Generated deployment manifests (target/kubernetes/*.yml) ─────────
# Don't stamp manifests with VCS metadata harvested from the surrounding git
# repo (avoids leaking unrelated remote URLs / commit ids into the bundle).
quarkus.kubernetes.add-vcs-annotations=false
quarkus.kubernetes.part-of=javaapp-operator

# ── Logging ──────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."io.example".level=DEBUG
